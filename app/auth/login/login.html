<div class="login-wrapper">
    <!-- Capa oscura/verde para que el texto resalte sobre el fondo -->
    <div class="overlay"></div>

    <div class="login-content">

        <!-- Lado Izquierdo: Bienvenida y Logo -->
        <div class="welcome-section">
            <img src="/logo.jpg" alt="Logo Jardín Botánico" class="logo">
            <h1>Bienvenido<br>al Sistema</h1>
            <p>
                Plataforma operativa y de control de accesos del Jardín Botánico.
                Ingresa tus credenciales para continuar al panel de administración.
            </p>
        </div>

        <!-- Lado Derecho: Formulario -->
        <div class="form-section">
            <div class="login-card">
                <h2>Iniciar sesión</h2>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input id="email" type="email" formControlName="email" placeholder="ejemplo@botanico.com"
                            [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input id="password" type="password" formControlName="password" placeholder="••••••••"
                            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Recordarme
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <div class="alert alert-danger" *ngIf="errorMessage">
                        {{ errorMessage }}
                    </div>

                    <button type="submit" [disabled]="isLoading" class="btn-submit">
                        <span *ngIf="!isLoading">Ingresar ahora</span>
                        <span *ngIf="isLoading">Verificando...</span>
                    </button>

                    <div class="guest-section">
                        <div class="divider">
                            <span>o</span>
                        </div>
                        <p>¿Eres una escuela interesada en visitarnos?</p>
                        <button type="button" class="btn-secondary" (click)="irAlFormulario()">
                            Llenar Solicitud de Visita
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
